name: Deploy vkn-mainframe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy vkn-mainframe Services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.LIGHTSAIL_HOST }}
        username: ${{ secrets.LIGHTSAIL_USER }}
        key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        script: |
          cd /home/ec2-user/vkn-mainframe
          git pull origin main

          docker-compose -f docker-compose.multi.yml --profile infrastructure down
          docker container prune -f
          docker builder prune -a -f
          docker-compose -f docker-compose.multi.yml --profile infrastructure up -d
          
          docker system prune -f
