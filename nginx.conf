events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name www.vknyvz.com vknyvz.com api.vknyvz.com volkanagram.vknyvz.com api-volkanagram.vknyvz.com;
        return 301 https://$server_name$request_uri;
    }

    # vknyvz.com
    server {
        listen 443 ssl http2;
        server_name www.vknyvz.com vknyvz.com;

        ssl_certificate /etc/letsencrypt/live/vknyvz.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vknyvz.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

        location / {
            set $upstream http://vknyvz-web:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        error_page 502 503 504 = @maintenance;
        location @maintenance {
            add_header Content-Type text/plain;
            return 503 "vknyvz.com is currently under maintenance. Please try again later.";
        }
    }

    #api.vknyvz.com
    server {
        listen 443 ssl http2;
        server_name api.vknyvz.com;

        ssl_certificate /etc/letsencrypt/live/api.vknyvz.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.vknyvz.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

        location / {
            set $upstream http://vknyvz-api:5000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        error_page 502 503 504 = @maintenance;
        location @maintenance {
            add_header Content-Type text/plain;
            return 503 "vknyvz.com API is currently under maintenance. Please try again later.";
        }
    }

    # volkanagram.vknyvz.com
    server {
        listen 443 ssl http2;
        server_name volkanagram.vknyvz.com;

        ssl_certificate /etc/letsencrypt/live/volkanagram.vknyvz.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/volkanagram.vknyvz.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

        location / {
            set $upstream http://volkanagram-web:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        error_page 502 503 504 = @maintenance;
        location @maintenance {
            add_header Content-Type text/plain;
            return 503 "volkanagram is currently under maintenance. Please try again later.";
        }
    }

    # api-volkanagram.vknyvz.com
    server {
        listen 443 ssl http2;
        server_name api-volkanagram.vknyvz.com;

        ssl_certificate /etc/letsencrypt/live/api-volkanagram.vknyvz.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-volkanagram.vknyvz.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

        location / {
            set $upstream http://volkanagram-api:5000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
        
        error_page 502 503 504 = @maintenance;
        location @maintenance {
            add_header Content-Type text/plain;
            return 503 "volkanagram API is currently under maintenance. Please try again later.";
        }
    }
}